<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="dashboard.css">
  <title>PromptFootprint Dashboard</title>
</head>
<body>
  <div class="pf-dashboard">
    <header class="pf-dash-header">
      <div class="pf-dash-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
        </svg>
        <h1>PromptFootprint</h1>
      </div>
      <p class="pf-dash-subtitle">Your environmental impact dashboard</p>
    </header>

    <div class="pf-dash-summary" id="pf-summary">
      <div class="pf-summary-card">
        <div class="pf-summary-icon pf-icon-tokens">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        </div>
        <div class="pf-summary-value" id="pf-total-tokens">0</div>
        <div class="pf-summary-label">Total Tokens</div>
      </div>
      <div class="pf-summary-card">
        <div class="pf-summary-icon pf-icon-energy">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
        <div class="pf-summary-value" id="pf-total-energy">0.000 Wh</div>
        <div class="pf-summary-label">Total Energy</div>
      </div>
      <div class="pf-summary-card">
        <div class="pf-summary-icon pf-icon-water">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>
        </div>
        <div class="pf-summary-value" id="pf-total-water">0.000 mL</div>
        <div class="pf-summary-label">Total Water</div>
      </div>
      <div class="pf-summary-card">
        <div class="pf-summary-icon pf-icon-co2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path><path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path><path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path></svg>
        </div>
        <div class="pf-summary-value" id="pf-total-co2">0.000 g</div>
        <div class="pf-summary-label">Total CO2</div>
      </div>
      <div class="pf-summary-card">
        <div class="pf-summary-icon pf-icon-sessions">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div class="pf-summary-value" id="pf-total-sessions">0</div>
        <div class="pf-summary-label">Sessions</div>
      </div>
    </div>

    <div class="pf-dash-sessions">
      <h2 class="pf-section-title">Session History</h2>
      <div class="pf-sessions-list" id="pf-sessions-list">
        <div class="pf-loading">Loading sessions...</div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
