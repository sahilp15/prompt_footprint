<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="popup.css">
  <title>PromptFootprint</title>
</head>
<body>
  <div class="pf-popup">

    <!-- Header -->
    <div class="pf-header">
      <div class="pf-brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--pf-accent-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
        </svg>
        <span class="pf-brand-name">PromptFootprint</span>
      </div>
      <div class="pf-status" id="pf-status">
        <span class="pf-status-dot"></span>
        <span class="pf-status-text">Inactive</span>
      </div>
    </div>

    <!-- Stats section -->
    <div class="pf-stats" id="pf-stats">
      <div class="pf-stats-label">This Week's Impact</div>
      <div class="pf-stats-grid">

        <div class="pf-stat-card pf-stat-tokens">
          <div class="pf-stat-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
          </div>
          <div class="pf-stat-value" id="pf-tokens">—</div>
          <div class="pf-stat-name">tokens</div>
          <div class="pf-stat-context" id="pf-tokens-ctx"></div>
        </div>

        <div class="pf-stat-card pf-stat-water">
          <div class="pf-stat-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path></svg>
          </div>
          <div class="pf-stat-value" id="pf-water">—</div>
          <div class="pf-stat-name">water</div>
          <div class="pf-stat-context" id="pf-water-ctx"></div>
        </div>

        <div class="pf-stat-card pf-stat-energy">
          <div class="pf-stat-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          </div>
          <div class="pf-stat-value" id="pf-energy">—</div>
          <div class="pf-stat-name">energy</div>
          <div class="pf-stat-context" id="pf-energy-ctx"></div>
        </div>

        <div class="pf-stat-card pf-stat-co2">
          <div class="pf-stat-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path><path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path><path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path></svg>
          </div>
          <div class="pf-stat-value" id="pf-co2">—</div>
          <div class="pf-stat-name">CO₂</div>
          <div class="pf-stat-context" id="pf-co2-ctx"></div>
        </div>

      </div>
    </div>

    <!-- Overlay toggle -->
    <div class="pf-setting">
      <span class="pf-setting-label">Show overlay on ChatGPT</span>
      <label class="pf-toggle">
        <input type="checkbox" id="pf-overlay-toggle" checked>
        <span class="pf-toggle-track">
          <span class="pf-toggle-thumb"></span>
        </span>
      </label>
    </div>

    <!-- Actions -->
    <div class="pf-actions">
      <button class="pf-btn" id="pf-open-stats">
        View Full Stats
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
