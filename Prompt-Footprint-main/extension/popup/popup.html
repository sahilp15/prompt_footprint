<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="popup.css">
  <title>PromptFootprint</title>
</head>
<body>
  <div class="pf-popup">
    <div class="pf-popup-header">
      <div class="pf-popup-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
        </svg>
        <span class="pf-popup-title">PromptFootprint</span>
      </div>
      <div class="pf-popup-status" id="pf-status">
        <span class="pf-status-dot"></span>
        <span class="pf-status-text">Inactive</span>
      </div>
    </div>

    <div class="pf-popup-section">
      <div class="pf-popup-row">
        <div class="pf-popup-row-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="6" width="22" height="12" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
          <span>Show overlay</span>
        </div>
        <label class="pf-toggle">
          <input type="checkbox" id="pf-overlay-toggle" checked>
          <span class="pf-toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="pf-popup-section">
      <div class="pf-popup-row-label" style="margin-bottom: 10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span>Energy multiplier</span>
        <span class="pf-multiplier-value" id="pf-multiplier-display">1.0x</span>
      </div>
      <input type="range" id="pf-multiplier" class="pf-range" min="1" max="14" step="0.1" value="1">
      <div class="pf-range-labels">
        <span>GPT-4o</span>
        <span>GPT-5 (high)</span>
      </div>
    </div>

    <div class="pf-popup-actions">
      <button class="pf-btn pf-btn-secondary" id="pf-open-dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        Dashboard
      </button>
      <button class="pf-btn pf-btn-primary" id="pf-open-stats">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        Stats Website
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
