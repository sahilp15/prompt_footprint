<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="popup.css">
  <title>PromptFootprint</title>
</head>
<body>
  <div class="pf-popup">

    <!-- Header -->
    <div class="pf-header">
      <div class="pf-brand">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--pf-accent-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
        </svg>
        <span class="pf-brand-name">PromptFootprint</span>
      </div>
      <div class="pf-status" id="pf-status">
        <span class="pf-status-dot"></span>
        <span class="pf-status-text">Inactive</span>
      </div>
    </div>

    <!-- This Week -->
    <div class="pf-section">
      <div class="pf-section-label">This Week's Impact</div>

      <div class="pf-cards">
        <!-- Tokens (row spanning) -->
        <div class="pf-card pf-card-tokens">
          <div class="pf-card-icon pf-icon-tokens">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
          </div>
          <div class="pf-card-main" id="pf-tokens">—</div>
          <div class="pf-card-sub">tokens sent</div>
        </div>

        <!-- Water -->
        <div class="pf-card pf-card-water">
          <div class="pf-card-icon pf-icon-water">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
            </svg>
          </div>
          <div class="pf-card-main" id="pf-water">—</div>
          <div class="pf-card-sub" id="pf-water-sub">of water</div>
        </div>

        <!-- Energy -->
        <div class="pf-card pf-card-energy">
          <div class="pf-card-icon pf-icon-energy">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          </div>
          <div class="pf-card-main" id="pf-energy">—</div>
          <div class="pf-card-sub" id="pf-energy-sub">of energy</div>
        </div>

        <!-- CO₂ -->
        <div class="pf-card pf-card-co2">
          <div class="pf-card-icon pf-icon-co2">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
            </svg>
          </div>
          <div class="pf-card-main" id="pf-co2">—</div>
          <div class="pf-card-sub" id="pf-co2-sub">CO₂</div>
        </div>
      </div>
    </div>

    <!-- Overlay toggle -->
    <div class="pf-setting">
      <span class="pf-setting-label">Show overlay on ChatGPT</span>
      <label class="pf-toggle">
        <input type="checkbox" id="pf-overlay-toggle" checked>
        <span class="pf-toggle-track">
          <span class="pf-toggle-thumb"></span>
        </span>
      </label>
    </div>

    <!-- CTA -->
    <div class="pf-actions">
      <button class="pf-btn" id="pf-open-stats">
        View Full Stats
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
